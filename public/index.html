<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>ලංකා කාලගුණ දත්ත</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .card { border: 1px solid #ccc; padding: 10px; margin: 5px; display: inline-block; width: 200px; }
    </style>
</head>
<body>
    <h1>🇱🇰 ලංකා කාලගුණ දත්ත</h1>
    <div id="app">Loading...</div>
    <script>
        fetch('/api/weather/all')
            .then(res => res.json())
            .then(data => {
                const app = document.getElementById('app');
                app.innerHTML = data.map(d => `
                    <div class="card">
                        <h3>${d.district}</h3>
                        <p>උෂ්ණත්වය: ${d.temp}</p>
                        <p>${d.condition}</p>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
