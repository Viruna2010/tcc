<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ලංකා කාලගුණ | Lanka Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky-deep:   #0a1628;
    --sky-mid:    #0f2347;
    --sky-light:  #1a3a6e;
    --ocean:      #1565C0;
    --ocean-light:#1E88E5;
    --rain:       #4FC3F7;
    --sun:        #FFB300;
    --sun-light:  #FFD54F;
    --leaf:       #2E7D32;
    --leaf-light: #43A047;
    --warm:       #E64A19;
    --card-bg:    rgba(255,255,255,0.06);
    --card-hover: rgba(255,255,255,0.1);
    --border:     rgba(255,255,255,0.12);
    --text-main:  #F0F4FF;
    --text-muted: #90A4AE;
    --text-dim:   #546E7A;
    --radius:     16px;
    --radius-sm:  10px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
    background: var(--sky-deep);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ANIMATION ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(21,101,192,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(255,179,0,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 0%,  rgba(79,195,247,0.12) 0%, transparent 40%);
    pointer-events: none;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,22,40,0.8);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }

  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--ocean), var(--rain));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .logo-text h1 {
    font-family: 'Noto Sans Sinhala', sans-serif;
    font-size: 20px; font-weight: 700;
    color: var(--text-main);
    line-height: 1.2;
  }

  .logo-text p { font-size: 12px; color: var(--text-muted); letter-spacing: 0.5px; }

  .header-status {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-muted);
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4CAF50;
    animation: pulse-dot 2s ease infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ── HERO STATS ── */
  .hero {
    padding: 32px 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }

  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    transition: background 0.2s;
  }

  .stat-card:hover { background: var(--card-hover); }

  .stat-value {
    font-size: 28px; font-weight: 600;
    color: var(--text-main); line-height: 1;
    margin-bottom: 4px;
  }

  .stat-value span { font-size: 16px; font-weight: 400; }
  .stat-label { font-size: 12px; color: var(--text-muted); }

  /* ── CONTROLS ── */
  .controls {
    padding: 16px 0;
    display: flex; align-items: center;
    flex-wrap: wrap; gap: 10px;
  }

  .search-box {
    position: relative; flex: 1; min-width: 220px;
  }

  .search-box input {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-main);
    padding: 10px 16px 10px 40px;
    border-radius: 100px;
    font-size: 14px; outline: none;
    font-family: 'Noto Sans Sinhala', 'Inter', sans-serif;
    transition: border-color 0.2s, background 0.2s;
  }

  .search-box input::placeholder { color: var(--text-dim); }

  .search-box input:focus {
    border-color: var(--rain);
    background: var(--card-hover);
  }

  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 16px; color: var(--text-dim); pointer-events: none;
  }

  .filter-btns {
    display: flex; gap: 6px; flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 14px;
    border-radius: 100px;
    font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans Sinhala', 'Inter', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--rain); color: var(--text-main); }
  .filter-btn.active { background: var(--ocean); border-color: var(--ocean-light); color: #fff; }

  .sort-select {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 14px;
    border-radius: 100px;
    font-size: 13px;
    cursor: pointer; outline: none;
    font-family: 'Noto Sans Sinhala', 'Inter', sans-serif;
  }

  .sort-select option { background: var(--sky-mid); }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 38px; height: 38px; border-radius: 50%;
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .refresh-btn:hover { border-color: var(--rain); color: var(--rain); }
  .refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── GRID ── */
  .weather-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    padding-bottom: 40px;
  }

  /* ── WEATHER CARD ── */
  .weather-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative; overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .weather-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--ocean), var(--rain));
    opacity: 0; transition: opacity 0.25s;
  }

  .weather-card:hover { background: var(--card-hover); transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }
  .weather-card:hover::before { opacity: 1; }

  .card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 16px;
  }

  .district-name {
    font-family: 'Noto Sans Sinhala', sans-serif;
    font-size: 18px; font-weight: 600;
    color: var(--text-main); line-height: 1.2;
  }

  .province-badge {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .weather-icon-wrap {
    font-size: 40px; line-height: 1;
    filter: drop-shadow(0 0 8px rgba(79,195,247,0.3));
  }

  .card-temp-row {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 12px;
  }

  .temp-main {
    font-size: 38px; font-weight: 300;
    color: var(--text-main); line-height: 1;
  }

  .temp-unit { font-size: 20px; color: var(--text-muted); }

  .temp-feels {
    font-size: 12px; color: var(--text-muted); margin-left: auto;
  }

  .condition-text {
    font-family: 'Noto Sans Sinhala', sans-serif;
    font-size: 14px; color: var(--rain);
    margin-bottom: 14px;
  }

  .card-details {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .detail-item {
    display: flex; align-items: center; gap: 6px;
  }

  .detail-icon { font-size: 14px; }

  .detail-text {
    font-size: 12px; color: var(--text-muted);
  }

  .detail-text strong {
    color: var(--text-main); font-weight: 500; display: block;
    font-size: 13px;
  }

  /* ── LOADING ── */
  .loading-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 300px; gap: 16px;
  }

  .loader {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--rain);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text {
    font-family: 'Noto Sans Sinhala', sans-serif;
    color: var(--text-muted); font-size: 14px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(5, 15, 30, 0.85);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.visible { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--sky-mid);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    max-width: 480px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    transform: scale(0.95);
    transition: transform 0.2s;
  }

  .modal-overlay.visible .modal { transform: scale(1); }

  .modal-close {
    float: right;
    background: var(--card-bg); border: 1px solid var(--border);
    color: var(--text-muted); width: 32px; height: 32px;
    border-radius: 50%; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover { border-color: var(--warm); color: var(--warm); }

  .modal-district {
    font-family: 'Noto Sans Sinhala', sans-serif;
    font-size: 28px; font-weight: 700;
    margin-bottom: 4px;
  }

  .modal-province {
    font-size: 13px; color: var(--text-muted); margin-bottom: 24px;
  }

  .modal-temp-hero {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 24px;
  }

  .modal-temp-icon { font-size: 72px; line-height: 1; }

  .modal-temp-num {
    font-size: 64px; font-weight: 200; line-height: 1;
    color: var(--text-main);
  }

  .modal-condition {
    font-family: 'Noto Sans Sinhala', sans-serif;
    font-size: 18px; color: var(--rain); margin-bottom: 4px;
  }

  .modal-feels { font-size: 13px; color: var(--text-muted); }

  .modal-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-top: 20px;
  }

  .modal-stat {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
  }

  .modal-stat-label {
    font-size: 11px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 6px;
  }

  .modal-stat-value {
    font-size: 20px; font-weight: 500; color: var(--text-main);
  }

  .modal-stat-unit { font-size: 13px; color: var(--text-muted); }

  .uv-bar {
    height: 6px; border-radius: 3px; margin-top: 8px;
    background: linear-gradient(90deg, #4CAF50, #FFC107, #FF9800, #F44336, #9C27B0);
  }

  .mock-badge {
    display: inline-block;
    background: rgba(255,179,0,0.15);
    border: 1px solid rgba(255,179,0,0.3);
    color: var(--sun);
    font-size: 11px; padding: 4px 10px;
    border-radius: 100px; margin-top: 16px;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    position: relative; z-index: 1;
  }

  /* ── EMPTY ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted);
    font-family: 'Noto Sans Sinhala', sans-serif;
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .hero { grid-template-columns: repeat(2, 1fr); }
    .weather-grid { grid-template-columns: 1fr; }
    .modal-grid { grid-template-columns: 1fr; }
    .modal-temp-num { font-size: 48px; }
    .modal-temp-icon { font-size: 56px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">🌦️</div>
        <div class="logo-text">
          <h1>ලංකා කාලගුණ</h1>
          <p>LANKA WEATHER — සියලු දිස්ත්‍රික්ක</p>
        </div>
      </div>
      <div class="header-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">ලෝඩ් වෙනවා...</span>
      </div>
    </div>
  </div>
</header>

<!-- HERO STATS -->
<div class="container">
  <div class="hero" id="heroStats">
    <div class="stat-card">
      <div class="stat-value" id="avgTemp">--<span>°C</span></div>
      <div class="stat-label">සාමාන්‍ය උෂ්ණත්වය</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="maxTemp">--<span>°C</span></div>
      <div class="stat-label">ඉහළම — <span id="maxTempDistrict">...</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="minTemp">--<span>°C</span></div>
      <div class="stat-label">අඩුම — <span id="minTempDistrict">...</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="rainyCount">--</div>
      <div class="stat-label">වැස්ස ඇති දිස්ත්‍රික්ක</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="avgHumidity">--<span>%</span></div>
      <div class="stat-label">සාමාන්‍ය ආර්ද්‍රතාව</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="දිස්ත්‍රික්කය සොයන්න... (eg: කොළඹ, Kandy)" />
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="all">සියල්ල</button>
      <button class="filter-btn" data-filter="බස්නාහිර">බස්නාහිර</button>
      <button class="filter-btn" data-filter="මධ්‍යම">මධ්‍යම</button>
      <button class="filter-btn" data-filter="දකුණු">දකුණු</button>
      <button class="filter-btn" data-filter="උතුරු">උතුරු</button>
      <button class="filter-btn" data-filter="නැගෙනහිර">නැගෙනහිර</button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="name">නම අනුව</option>
      <option value="temp-desc">ඉහළ උෂ්ණ</option>
      <option value="temp-asc">අඩු උෂ්ණ</option>
      <option value="humidity">ආර්ද්‍රතාව</option>
    </select>
    <button class="refresh-btn" id="refreshBtn" title="Refresh">🔄</button>
  </div>

  <!-- GRID -->
  <div id="weatherGrid" class="weather-grid">
    <div class="loading-state">
      <div class="loader"></div>
      <p class="loading-text">කාලගුණ දත්ත ලබාගනිමින්...</p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<footer>
  <div class="container">
    <p>ශ්‍රී ලංකාවේ සියලු දිස්ත්‍රික්ක 25 | Lanka Weather &copy; 2025 | OpenWeatherMap API</p>
  </div>
</footer>

<script>
  const API_BASE = window.location.origin;
  let allWeatherData = [];
  let activeFilter   = 'all';
  let searchQuery    = '';
  let sortMode       = 'name';

  const conditionEmoji = {
    'Clear': '☀️', 'Clouds': '⛅', 'Rain': '🌧️', 'Drizzle': '🌦️',
    'Thunderstorm': '⛈️', 'Snow': '❄️', 'Mist': '🌫️',
    'Smoke': '😶‍🌫️', 'Haze': '🌁', 'Dust': '💨',
    'Fog': '🌁', 'Squall': '💨', 'Tornado': '🌪️',
  };

  function getEmoji(condition) {
    return conditionEmoji[condition] || '🌡️';
  }

  function windDirection(deg) {
    const dirs = ['උ', 'උ.නැ', 'නැ', 'ද.නැ', 'ද', 'ද.බ', 'බ', 'උ.බ'];
    return dirs[Math.round(deg / 45) % 8];
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString('si-LK', { hour: '2-digit', minute: '2-digit' });
  }

  // ── FETCH ──
  async function fetchAllWeather() {
    const grid = document.getElementById('weatherGrid');
    const btn  = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    grid.innerHTML = `<div class="loading-state"><div class="loader"></div><p class="loading-text">කාලගුණ දත්ත ලබාගනිමින්...</p></div>`;

    try {
      const res  = await fetch(`${API_BASE}/api/weather/all`);
      const json = await res.json();

      if (!json.success) throw new Error(json.error);
      allWeatherData = json.data;
      updateHeroStats(allWeatherData);
      renderGrid(filterAndSort(allWeatherData));

      const isMock = json.data.some(d => d.isMock);
      document.getElementById('statusText').textContent =
        isMock ? 'Demo Mode — Mock Data' : `Live — ${formatTime(json.timestamp)}`;

    } catch (err) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>දත්ත ලබාගැනීමේ දෝෂයකි<br><small>${err.message}</small></p></div>`;
      document.getElementById('statusText').textContent = 'දෝෂය';
    } finally {
      btn.classList.remove('spinning');
    }
  }

  // ── HERO STATS ──
  function updateHeroStats(data) {
    const temps     = data.map(d => d.temp);
    const avg       = temps.reduce((a, b) => a + b, 0) / temps.length;
    const max       = Math.max(...temps);
    const min       = Math.min(...temps);
    const maxD      = data.find(d => d.temp === max);
    const minD      = data.find(d => d.temp === min);
    const rainy     = data.filter(d => ['Rain','Drizzle','Thunderstorm'].includes(d.condition)).length;
    const avgHum    = data.reduce((a, b) => a + b.humidity, 0) / data.length;

    document.getElementById('avgTemp').innerHTML       = `${avg.toFixed(1)}<span>°C</span>`;
    document.getElementById('maxTemp').innerHTML       = `${max}<span>°C</span>`;
    document.getElementById('minTemp').innerHTML       = `${min}<span>°C</span>`;
    document.getElementById('maxTempDistrict').textContent = maxD?.districtSi || '';
    document.getElementById('minTempDistrict').textContent = minD?.districtSi || '';
    document.getElementById('rainyCount').textContent  = rainy;
    document.getElementById('avgHumidity').innerHTML   = `${Math.round(avgHum)}<span>%</span>`;
  }

  // ── FILTER & SORT ──
  function filterAndSort(data) {
    let filtered = [...data];

    if (activeFilter !== 'all') {
      filtered = filtered.filter(d => d.province.includes(activeFilter));
    }

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(d =>
        d.districtSi.includes(searchQuery) ||
        d.district.toLowerCase().includes(q) ||
        d.province.includes(searchQuery)
      );
    }

    filtered.sort((a, b) => {
      if (sortMode === 'temp-desc')  return b.temp - a.temp;
      if (sortMode === 'temp-asc')   return a.temp - b.temp;
      if (sortMode === 'humidity')   return b.humidity - a.humidity;
      return a.districtSi.localeCompare(b.districtSi, 'si');
    });

    return filtered;
  }

  // ── RENDER GRID ──
  function renderGrid(data) {
    const grid = document.getElementById('weatherGrid');
    if (!data.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>දිස්ත්‍රික්ක හමු නොවිණි</p></div>`;
      return;
    }

    grid.innerHTML = data.map((d, i) => `
      <div class="weather-card" onclick="openModal('${d.district}')"
           style="animation-delay: ${i * 0.03}s">
        <div class="card-header">
          <div>
            <div class="district-name">${d.districtSi}</div>
            <div class="province-badge">${d.province} පළාත</div>
          </div>
          <div class="weather-icon-wrap">${getEmoji(d.condition)}</div>
        </div>
        <div class="card-temp-row">
          <div class="temp-main">${d.temp}</div>
          <div class="temp-unit">°C</div>
          <div class="temp-feels">දැනෙන්නේ ${d.feelsLike}°</div>
        </div>
        <div class="condition-text">${d.conditionSi}</div>
        <div class="card-details">
          <div class="detail-item">
            <span class="detail-icon">💧</span>
            <div class="detail-text"><strong>${d.humidity}%</strong>ආර්ද්‍රතාව</div>
          </div>
          <div class="detail-item">
            <span class="detail-icon">💨</span>
            <div class="detail-text"><strong>${d.windSpeed} m/s</strong>සුළඟ</div>
          </div>
          <div class="detail-item">
            <span class="detail-icon">👁️</span>
            <div class="detail-text"><strong>${d.visibility} km</strong>දෘශ්‍යතාව</div>
          </div>
          <div class="detail-item">
            <span class="detail-icon">☀️</span>
            <div class="detail-text">
              <strong style="color:${d.uvLevel.color}">${d.uvLevel.label}</strong>UV Index
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── MODAL ──
  function openModal(districtId) {
    const d = allWeatherData.find(x => x.district === districtId);
    if (!d) return;

    document.getElementById('modalBody').innerHTML = `
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-district">${d.districtSi}</div>
      <div class="modal-province">${d.province} පළාත · ${d.district}</div>

      <div class="modal-temp-hero">
        <div class="modal-temp-icon">${getEmoji(d.condition)}</div>
        <div>
          <div class="modal-temp-num">${d.temp}°</div>
          <div class="modal-condition">${d.conditionSi}</div>
          <div class="modal-feels">දැනෙන්නේ ${d.feelsLike}°C ලෙස</div>
        </div>
      </div>

      <div class="modal-grid">
        <div class="modal-stat">
          <div class="modal-stat-label">ආර්ද්‍රතාව</div>
          <div class="modal-stat-value">${d.humidity}<span class="modal-stat-unit"> %</span></div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">සුළං වේගය</div>
          <div class="modal-stat-value">${d.windSpeed}<span class="modal-stat-unit"> m/s</span></div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">සුළං දිශාව</div>
          <div class="modal-stat-value">${windDirection(d.windDeg)}<span class="modal-stat-unit"> (${d.windDeg}°)</span></div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">වායු පීඩනය</div>
          <div class="modal-stat-value">${d.pressure}<span class="modal-stat-unit"> hPa</span></div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">දෘශ්‍යතාව</div>
          <div class="modal-stat-value">${d.visibility}<span class="modal-stat-unit"> km</span></div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">UV Index</div>
          <div class="modal-stat-value" style="color:${d.uvLevel.color}">${d.uvIndex} — ${d.uvLevel.label}</div>
          <div class="uv-bar" style="width:${Math.min(d.uvIndex / 12 * 100, 100)}%"></div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">හිරු නගිනවා</div>
          <div class="modal-stat-value">${d.sunrise}<span class="modal-stat-unit"> AM</span></div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-label">හිරු බසිනවා</div>
          <div class="modal-stat-value">${d.sunset}<span class="modal-stat-unit"> PM</span></div>
        </div>
      </div>

      <div class="modal-stat" style="margin-top:12px">
        <div class="modal-stat-label">ඛණ්ඩාංක</div>
        <div class="modal-stat-value" style="font-size:14px">${d.lat.toFixed(4)}°N, ${d.lon.toFixed(4)}°E</div>
      </div>

      ${d.isMock ? '<div class="mock-badge">⚠️ Demo Data — API Key add කරන්නට server.js edit කරන්න</div>' : ''}

      <div style="margin-top:12px; font-size:11px; color:var(--text-dim)">
        අවසාන යාවත්කාලීනය: ${new Date(d.updatedAt).toLocaleString('si-LK')}
      </div>
    `;

    document.getElementById('modalOverlay').classList.add('visible');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(event) {
    if (event && event.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('visible');
    document.body.style.overflow = '';
  }

  // ── EVENTS ──
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    renderGrid(filterAndSort(allWeatherData));
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderGrid(filterAndSort(allWeatherData));
    });
  });

  document.getElementById('sortSelect').addEventListener('change', e => {
    sortMode = e.target.value;
    renderGrid(filterAndSort(allWeatherData));
  });

  document.getElementById('refreshBtn').addEventListener('click', fetchAllWeather);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  // ── INIT ──
  fetchAllWeather();
  setInterval(fetchAllWeather, 10 * 60 * 1000);
</script>
</body>
</html>
